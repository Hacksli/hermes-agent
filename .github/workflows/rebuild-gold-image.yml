name: Rebuild youself.io Gold Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build gold image on Proxmox
        env:
          PROXMOX_HOST: ${{ secrets.YOUSELF_PROXMOX_HOST }}
          PROXMOX_PASSWORD: ${{ secrets.YOUSELF_PROXMOX_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass 2>/dev/null

          # Preserve BASE_TEMPLATE from Proxmox, then upload script
          REMOTE_BASE=$(sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "grep '^BASE_TEMPLATE=' /opt/build-gold-image.sh | cut -d= -f2" 2>/dev/null || echo "9039")
          sed "s/^BASE_TEMPLATE=.*/BASE_TEMPLATE=$REMOTE_BASE/" youself/build-gold-image.sh > /tmp/build-gold-image.sh
          sshpass -p "$PROXMOX_PASSWORD" scp -o StrictHostKeyChecking=no \
            /tmp/build-gold-image.sh root@$PROXMOX_HOST:/opt/build-gold-image.sh

          # Run the script with secrets passed as env vars
          sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "YOUSELF_ADMIN_TOKEN='${{ secrets.YOUSELF_ADMIN_TOKEN }}' bash /opt/build-gold-image.sh 2>&1" | tee /tmp/build.log

          # Verify success
          if grep -q 'Gold image.*ready' /tmp/build.log; then
            echo "✅ $(grep 'Gold image.*ready' /tmp/build.log | tail -1)"
          else
            echo "❌ Build failed"
            cat /tmp/build.log
            exit 1
          fi

      - name: Commit updated BASE_TEMPLATE to repo
        run: |
          NEW_BASE=$(sshpass -p "${{ secrets.YOUSELF_PROXMOX_PASSWORD }}" ssh -o StrictHostKeyChecking=no root@${{ secrets.YOUSELF_PROXMOX_HOST }} \
            "grep '^BASE_TEMPLATE=' /opt/build-gold-image.sh | cut -d= -f2" 2>/dev/null)
          if [ -n "$NEW_BASE" ]; then
            sed -i "s/^BASE_TEMPLATE=.*/BASE_TEMPLATE=$NEW_BASE/" youself/build-gold-image.sh
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add youself/build-gold-image.sh
            git diff --staged --quiet || git commit -m "ci: update BASE_TEMPLATE to $NEW_BASE [skip ci]"
            git push
          fi

      - name: Update all running client VMs
        env:
          ADMIN_TOKEN: ${{ secrets.YOUSELF_ADMIN_TOKEN }}
          API_URL: ${{ secrets.YOUSELF_API_URL }}
        run: |
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_URL/admin/agents/update")
          echo "Agent update: $RESP"
          # Check enqueued > 0
          ENQUEUED=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('enqueued',0))" 2>/dev/null || echo 0)
          echo "✅ Queued updates for $ENQUEUED VMs"
