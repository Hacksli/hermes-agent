name: Rebuild youself.io Gold Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger gold image rebuild on Proxmox
        env:
          PROXMOX_HOST: ${{ secrets.YOUSELF_PROXMOX_HOST }}
          PROXMOX_PASSWORD: ${{ secrets.YOUSELF_PROXMOX_PASSWORD }}
          ADMIN_TOKEN: ${{ secrets.YOUSELF_ADMIN_TOKEN }}
          API_URL: ${{ secrets.YOUSELF_API_URL }}
        run: |
          sudo apt-get install -y sshpass 2>/dev/null

          # Read current BASE_TEMPLATE from build script on Proxmox (source of truth)
          CURRENT=$(sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "grep '^BASE_TEMPLATE=' /opt/build-gold-image.sh | cut -d= -f2" 2>/dev/null || echo "9014")
          NEXT=$((CURRENT + 1))
          echo "Current base: $CURRENT → Building: $NEXT"

          # Update BASE_TEMPLATE and VERSION in build script
          sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "sed -i \"s/^BASE_TEMPLATE=.*/BASE_TEMPLATE=$CURRENT/\" /opt/build-gold-image.sh"

          # Run build - script auto-updates DB on success
          sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "bash /opt/build-gold-image.sh $NEXT 2>&1" | tee /tmp/build.log | tail -5

          grep -q 'Gold image.*ready' /tmp/build.log && echo "✅ Gold image $NEXT built" || (echo '❌ Build failed' && exit 1)
