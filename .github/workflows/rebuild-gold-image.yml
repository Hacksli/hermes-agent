name: Rebuild youself.io Gold Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Build gold image on Proxmox
        env:
          PROXMOX_HOST: ${{ secrets.YOUSELF_PROXMOX_HOST }}
          PROXMOX_PASSWORD: ${{ secrets.YOUSELF_PROXMOX_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass 2>/dev/null

          # Fetch all infra scripts from deployment repo
          BASE_URL="https://raw.githubusercontent.com/Hacksli/deployment-youself-io-go-backend/main/scripts"
          for script in build-gold-image.sh setup-hermes.sh scrub-vm.sh; do
            curl -sf "$BASE_URL/$script" -o "/tmp/$script"
          done

          # Preserve BASE_TEMPLATE from Proxmox
          REMOTE_BASE=$(sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "grep '^BASE_TEMPLATE=' /opt/build-gold-image.sh | cut -d= -f2" 2>/dev/null || echo "9039")
          sed -i "s/^BASE_TEMPLATE=.*/BASE_TEMPLATE=$REMOTE_BASE/" /tmp/build-gold-image.sh

          # Upload scripts to Proxmox
          sshpass -p "$PROXMOX_PASSWORD" scp -o StrictHostKeyChecking=no \
            /tmp/build-gold-image.sh root@$PROXMOX_HOST:/opt/build-gold-image.sh
          sshpass -p "$PROXMOX_PASSWORD" scp -o StrictHostKeyChecking=no \
            /tmp/setup-hermes.sh root@$PROXMOX_HOST:/var/lib/vz/snippets/setup-hermes.sh
          sshpass -p "$PROXMOX_PASSWORD" scp -o StrictHostKeyChecking=no \
            /tmp/scrub-vm.sh root@$PROXMOX_HOST:/var/lib/vz/snippets/scrub-vm.sh

          # Run the script
          sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "bash /opt/build-gold-image.sh 2>&1" | tee /tmp/build.log

          # Verify success
          if grep -q 'Gold image.*ready' /tmp/build.log; then
            echo "✅ $(grep 'Gold image.*ready' /tmp/build.log | tail -1)"
          else
            echo "❌ Build failed"
            cat /tmp/build.log
            exit 1
          fi

      - name: Update all running client VMs
        env:
          ADMIN_TOKEN: ${{ secrets.YOUSELF_ADMIN_TOKEN }}
          API_URL: ${{ secrets.YOUSELF_API_URL }}
        run: |
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_URL/admin/agents/update")
          echo "Agent update: $RESP"
          # Check enqueued > 0
          ENQUEUED=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('enqueued',0))" 2>/dev/null || echo 0)
          echo "✅ Queued updates for $ENQUEUED VMs"
