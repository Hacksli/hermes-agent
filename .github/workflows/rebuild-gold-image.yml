name: Rebuild youself.io Gold Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Build gold image on Proxmox
        env:
          PROXMOX_HOST: ${{ secrets.YOUSELF_PROXMOX_HOST }}
          PROXMOX_PASSWORD: ${{ secrets.YOUSELF_PROXMOX_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass 2>/dev/null

          # Script auto-increments VMID, updates BASE_TEMPLATE, updates DB
          sshpass -p "$PROXMOX_PASSWORD" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST \
            "bash /opt/build-gold-image.sh 2>&1" | tee /tmp/build.log

          # Verify success
          if grep -q 'Gold image.*ready' /tmp/build.log; then
            echo "✅ $(grep 'Gold image.*ready' /tmp/build.log | tail -1)"
          else
            echo "❌ Build failed"
            cat /tmp/build.log
            exit 1
          fi

      - name: Update all running client VMs
        env:
          ADMIN_TOKEN: ${{ secrets.YOUSELF_ADMIN_TOKEN }}
          API_URL: ${{ secrets.YOUSELF_API_URL }}
        run: |
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_URL/admin/agents/update")
          echo "Agent update: $RESP"
          # Check enqueued > 0
          ENQUEUED=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('enqueued',0))" 2>/dev/null || echo 0)
          echo "✅ Queued updates for $ENQUEUED VMs"
